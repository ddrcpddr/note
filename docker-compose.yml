services:
  note:
    build: .
    container_name: note
    restart: unless-stopped
    ports:
      - "3300:3300"
    environment:
      PORT: "3300"
      NOTE_DATA_DIR: "/data"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3300/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
